version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://smartassist_user:smartassist_pass@db:5432/smartassist_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=smartassist-disaster-ai-secret-key-2024
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=smartassist_user
      - POSTGRES_PASSWORD=smartassist_pass
      - POSTGRES_DB=smartassist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A app.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://smartassist_user:smartassist_pass@db:5432/smartassist_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data:
